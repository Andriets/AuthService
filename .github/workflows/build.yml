name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/AuthService.slnx

      - name: Build
        run: dotnet build src/AuthService.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/AuthService.slnx --no-build --configuration Release
